version: "3.9"

services:

  db:
    image: postgres:15
    container_name: expense_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: expense_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data   # data persists across restarts

  api:
    build:
      context: ./backend
    container_name: expense_api
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db                                # waits for postgres to start first

volumes:
  pgdata: